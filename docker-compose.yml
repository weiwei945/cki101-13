services:
  web:
    build: .
    container_name: flask_web_app
    ports:
      - "80:5000"
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: mysql.cki101
    ports:
      - "8625:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cki101
    volumes:
      - ./db_data:/var/lib/mysql
    restart: unless-stopped
